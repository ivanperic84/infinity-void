<script>
/* Fallback: wenn React nicht geladen wurde (kein Netz), zeige Hinweis statt Weiß */
window.addEventListener("load", function(){
  setTimeout(function(){
    if(!window.React || !window.ReactDOM){
      document.getElementById("fatal").style.display="block";
    }
  }, 1500);
});
</script>

<script>
(function(){
  if(!window.React || !window.ReactDOM){ return; } // Fallback-Hinweis greift
  var h = React.createElement;
  var useState=React.useState, useEffect=React.useEffect, useMemo=React.useMemo, useRef=React.useRef;

/* ============================================================
   [0] ICON
   ============================================================ */
function Icon(props){
  var ref=useRef(null);
  useEffect(function(){
    if(ref.current){
      ref.current.innerHTML="";
      var el=document.createElement("i");
      el.setAttribute("data-lucide", props.name);
      ref.current.appendChild(el);
      if(window.lucide) window.lucide.createIcons();
    }
  },[props.name]);
  var style = props.size ? {width:props.size,height:props.size} : {};
  return h("span",{ref:ref, className:"inline-flex "+(props.className||""), style:style});
}

/* ============================================================
   [1] DATA / API LAYER  ← HIER kommt später Supabase rein
   ============================================================ */
var SUPABASE_URL="";        // ← "https://xxxx.supabase.co"
var SUPABASE_ANON_KEY="";   // ← anon/public key
var supabase=null;
if(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase){
  supabase=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

var store={
  get:function(k,f){ try{var v=localStorage.getItem("tabi_"+k);return v?JSON.parse(v):f;}catch(e){return f;} },
  set:function(k,v){ try{localStorage.setItem("tabi_"+k,JSON.stringify(v));}catch(e){} }
};

var api={
  login:function(email,pw){
    // SUPABASE: return supabase.auth.signInWithPassword({email,password:pw}).then(r=>{if(r.error)throw r.error;return r.data.user;});
    if(!email||!pw) return Promise.reject(new Error("Bitte E-Mail und Passwort eingeben."));
    var user={email:email,name:email.split("@")[0]}; store.set("session",user); return Promise.resolve(user);
  },
  logout:function(){ /* SUPABASE: supabase.auth.signOut(); */ store.set("session",null); return Promise.resolve(); },
  getSession:function(){ return Promise.resolve(store.get("session",null)); },

  fetchTrip:function(){ return Promise.resolve(store.get("trip",SEED.trip)); },
  fetchRestaurants:function(){ return Promise.resolve(store.get("restaurants",SEED.restaurants)); },
  saveRestaurants:function(l){ store.set("restaurants",l); },
  fetchSpots:function(){ return Promise.resolve(store.get("spots",SEED.spots)); },
  saveSpots:function(l){ store.set("spots",l); },
  fetchStays:function(){ return Promise.resolve(store.get("stays",SEED.stays)); },
  saveStays:function(l){ store.set("stays",l); },
  fetchPacking:function(){ return Promise.resolve(store.get("packing",SEED.packing)); },
  savePacking:function(l){ store.set("packing",l); },
  fetchPhotos:function(){ return Promise.resolve(store.get("photos",SEED.photos)); },
  savePhotos:function(l){ store.set("photos",l); },

  uploadVoiceNote:function(blob){ /* SUPABASE STORAGE upload */ return Promise.resolve("local-only://voice"); },
  createShareLink:function(){
    var t=Math.random().toString(36).slice(2,10);
    return Promise.resolve(location.origin+location.pathname+"?view="+t);
  },
  aiSuggest:function(prompt){
    return fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    }).then(function(r){return r.json();}).then(function(d){
      return d.content.map(function(b){return b.type==="text"?b.text:"";}).join("").trim();
    }).catch(function(){ return "Konnte gerade keinen Vorschlag laden."; });
  }
};

function LoginScreen(p){
  var s=useState(""),email=s[0],setEmail=s[1];
  var s2=useState(""),pw=s2[0],setPw=s2[1];
  var s3=useState(""),err=s3[0],setErr=s3[1];
  var s4=useState(false),busy=s4[0],setBusy=s4[1];
  function submit(){
    setErr(""); setBusy(true);
    api.login(email,pw).then(function(u){p.onLogin(u);}).catch(function(e){setErr(e.message);}).then(function(){setBusy(false);});
  }
  function onKey(e){ if(e.key==="Enter") submit(); }
  return h("div",{className:"min-h-screen flex items-center justify-center p-6"},
    h("div",{className:"w-full max-w-sm fade-in"},
      h("div",{className:"text-center mb-4"},

      h("div",{className:"space-y-3",style:{marginTop:"1.5rem"}},
        h("input",{className:"inp",type:"email",placeholder:"E-Mail",value:email,onChange:function(e){setEmail(e.target.value);},onKeyDown:onKey}),
        h("input",{className:"inp",type:"password",placeholder:"Passwort",value:pw,onChange:function(e){setPw(e.target.value);},onKeyDown:onKey}),
        err?h("p",{className:"text-vermilion text-sm"},err):null,

      h("p",{className:"text-center text-xs text-muted",style:{marginTop:"1.5rem"}},"Geschützter Bereich · später über Supabase abgesichert")

  );
}

/* ============================================================
   [5] COUNTDOWN
   ============================================================ */
function Countdown(p){
  var s=useState(Date.now()),now=s[0],setNow=s[1];
  useEffect(function(){var t=setInterval(function(){setNow(Date.now());},1000);return function(){clearInterval(t);};},[]);
  var diff=Math.max(0,new Date(p.target).getTime()-now);
  var d=Math.floor(diff/86400000),hh=Math.floor(diff/3600000)%24,m=Math.floor(diff/60000)%60,sec=Math.floor(diff/1000)%60;
  function Unit(v,l){
    return h("div",{className:"text-center"},
      h("div",{className:"font-mono text-4xl sm:text-4xl tabular-nums"},String(v).padStart(2,"0")),
      h("div",{className:"text-xs uppercase tracking-widest text-muted mt-1"},l));
  }
  return h("div",{className:"flex gap-4 sm:gap-8 justify-center"}, Unit(d,"Tage"),Unit(hh,"Std"),Unit(m,"Min"),Unit(sec,"Sek"));
}

  useEffect(function(){api.getSession().then(function(u){setUser(u);setReady(true);});},[]);

  if(!ready) return h("div",{className:"min-h-screen flex items-center justify-center text-muted"},"Lädt…");
  if(!user) return h(LoginScreen,{onLogin:setUser});

    h("header",{className:"sticky top-0 z-40 border-b backdrop",style:{background:"rgba(250,248,244,.9)"}},
      h("div",{className:"max-w-3xl mx-auto px-5 h-14 flex items-center justify-between"},
        h("span",{className:"font-display text-2xl"},"旅 Tabi"),
        h("div",{className:"flex items-center gap-3"},
          h("span",{className:"text-sm text-muted sm:inline hidden"},user.name),
          h("button",{className:"text-muted",onClick:function(){api.logout().then(function(){setUser(null);});}}, h(Icon,{name:"log-out"})))),
      h("nav",{className:"sm:flex hidden max-w-3xl mx-auto px-5 gap-1"},
        TABS.map(function(t){return h("button",{key:t.key,onClick:function(){setTab(t.key);},

          h(Icon,{name:t.icon})," "+t.label);}))),
    h("main",{className:"max-w-3xl mx-auto px-5 py-6"}, view),
    h("nav",{className:"sm:hidden fixed bottom-0 inset-x-0 z-40 border-t backdrop",style:{background:"rgba(250,248,244,.95)"}},
      h("div",{className:"flex justify-around py-2",style:{paddingBottom:"max(0.5rem, env(safe-area-inset-bottom))"}},
        TABS.map(function(t){return h("button",{key:t.key,onClick:function(){setTab(t.key);},className:"flex flex-col items-center gap-1 px-2",

          h(Icon,{name:t.icon,size:"1.2rem"}), h("span",{style:{fontSize:"10px"}},t.label));}))),
    h(Modal,{open:!!shareLink,onClose:function(){setShareLink(null);},title:"Reise teilen"},

      h("div",{className:"flex gap-2"},

  );
}
