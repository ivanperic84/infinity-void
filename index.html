<script>
window.addEventListener("load", function(){
  setTimeout(function(){ if(!window.React || !window.ReactDOM){ document.getElementById("fatal").style.display="block"; } }, 1500);
});
/* Theme früh setzen (verhindert Flackern) */
(function(){ try{ var t=localStorage.getItem("iv_theme")||"dark"; document.documentElement.setAttribute("data-theme", t); var dm=localStorage.getItem("iv_domain")||"off"; document.documentElement.setAttribute("data-domain", dm); }catch(e){ document.documentElement.setAttribute("data-theme","dark"); document.documentElement.setAttribute("data-domain","off"); } })();

<script>
(function(){
  if(!window.React || !window.ReactDOM){ return; }
  var h=React.createElement, useState=React.useState, useEffect=React.useEffect, useMemo=React.useMemo, useRef=React.useRef;

/* ============================================================
   [0] ICON
   ============================================================ */
function Icon(props){
  var ref=useRef(null);
  useEffect(function(){
    if(ref.current){ ref.current.innerHTML="";
      var el=document.createElement("i"); el.setAttribute("data-lucide", props.name); ref.current.appendChild(el);
      if(window.lucide) window.lucide.createIcons();
    }
  },[props.name]);
  var style=props.size?{width:props.size,height:props.size}:{};
  return h("span",{ref:ref,className:"inline-flex "+(props.className||""),style:style});
}

/* ============================================================
   [0b] SPRACHEINGABE  (Web Speech API, DE/EN + Audio-Fallback)
   ------------------------------------------------------------
   - Online: erkennt gesprochenen Text direkt im Browser.
   - Sprache wählbar: de-DE / en-US.
   - Kein Internet / nicht unterstützt: nimmt Audio auf und meldet
     das über onAudioFallback (Text-Umwandlung später via Supabase).
   ============================================================ */
function VoiceButton(p){
  var s=useState(false),rec=s[0],setRec=s[1];
  var s2=useState("de-DE"),lang=s2[0],setLang=s2[1];
  var recogRef=useRef(null), mediaRef=useRef(null);
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function startSpeech(){
    var r=new SR(); recogRef.current=r;
    r.lang=lang; r.interimResults=true; r.continuous=false;
    var finalTxt="";
    r.onresult=function(e){
      var interim="";
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) finalTxt+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      if(p.onInterim) p.onInterim(finalTxt+interim);
    };
    r.onerror=function(){ stopAll(); audioFallback(); };
    r.onend=function(){ setRec(false); if(finalTxt && p.onText) p.onText(finalTxt.trim()); };
    try{ r.start(); setRec(true); }catch(e){ audioFallback(); }
  }
  function audioFallback(){
    if(!navigator.mediaDevices){ if(p.onError)p.onError("Mikrofon nicht verfügbar."); return; }
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      var mr=new MediaRecorder(stream),chunks=[]; mediaRef.current=mr;
      mr.ondataavailable=function(e){chunks.push(e.data);};
      mr.onstop=function(){ stream.getTracks().forEach(function(t){t.stop();}); if(p.onAudioFallback) p.onAudioFallback(new Blob(chunks)); };
      mr.start(); setRec(true);
      setTimeout(function(){ if(mr.state!=="inactive"){ mr.stop(); setRec(false); } },8000);
    }).catch(function(){ if(p.onError)p.onError("Mikrofonzugriff nicht möglich."); });
  }
  function stopAll(){
    if(recogRef.current){ try{recogRef.current.stop();}catch(e){} }
    if(mediaRef.current && mediaRef.current.state!=="inactive"){ try{mediaRef.current.stop();}catch(e){} }
    setRec(false);
  }
  function toggle(){ if(rec){ stopAll(); return; } if(navigator.onLine && SR){ startSpeech(); } else { audioFallback(); } }

  return h("div",{className:"flex items-center gap-1"},
    h("button",{onClick:function(){ setLang(lang==="de-DE"?"en-US":"de-DE"); },title:"Sprache umschalten",
      className:"text-xs px-2 py-1 rounded-lg",style:{border:"1px solid var(--line)",color:"var(--muted)"}}, lang==="de-DE"?"DE":"EN"),
    h("button",{onClick:toggle,title:"Per Sprache eingeben",className:"px-3 rounded-lg",style:{height:"2.25rem",
      border:"1px solid "+(rec?"var(--signal)":"var(--line)"),background:rec?"var(--signal)":"transparent",color:rec?"#000":"var(--accent)"}},
      h(Icon,{name:rec?"square":"mic"}))
  );
}

/* ============================================================
   [1] DATA / API LAYER  ← HIER kommt später Supabase rein
   ------------------------------------------------------------
   Daten sind jetzt PRO REISE (tripId) organisiert, weil die App
   allgemein ist und mehrere Reisen verwaltet.
   ============================================================ */
var SUPABASE_URL="";        // ← "https://xxxx.supabase.co"
var SUPABASE_ANON_KEY="";   // ← anon/public key
var supabase=null;
if(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase){ supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); }

var store={
  get:function(k,f){ try{var v=localStorage.getItem("iv_"+k);return v?JSON.parse(v):f;}catch(e){return f;} },
  set:function(k,v){ try{localStorage.setItem("iv_"+k,JSON.stringify(v));}catch(e){} }
};

var api={
  login:function(email,pw){
    if(!email||!pw) return Promise.reject(new Error("Bitte E-Mail und Passwort eingeben."));
    var user={email:email,name:email.split("@")[0]}; store.set("session",user); return Promise.resolve(user);
  },
  logout:function(){ store.set("session",null); return Promise.resolve(); },
  getSession:function(){ return Promise.resolve(store.get("session",null)); },

  fetchTrips:function(){ return Promise.resolve(store.get("trips",SEED.trips)); },
  saveDays:function(tripId, days){ var trips=store.get("trips",SEED.trips); trips=trips.map(function(t){return t.id===tripId?Object.assign({},t,{days:days}):t;}); store.set("trips",trips); },
  // pro-Reise-Daten: key = "<typ>_<tripId>"
  fetch:function(type,tripId){ return Promise.resolve(store.get(type+"_"+tripId, (SEED[type]&&SEED[type][tripId])||[])); },
  save:function(type,tripId,list){ store.set(type+"_"+tripId,list); /* SUPABASE: upsert where trip_id=tripId */ },
  // GPS-Strecke (Ankerpunkte) pro Reise
  fetchTrack:function(tripId){ return Promise.resolve(store.get("track_"+tripId, (SEED.track&&SEED.track[tripId])||[])); },
  saveTrack:function(tripId,points){ store.set("track_"+tripId,points); /* SUPABASE: table track_points */ },
  fetchTrackSettings:function(tripId){ return Promise.resolve(store.get("tracksettings_"+tripId,{interval:"off"})); },
  saveTrackSettings:function(tripId,s){ store.set("tracksettings_"+tripId,s); },

  uploadVoiceNote:function(blob){ return Promise.resolve("local-only://voice"); },
  createShareLink:function(tripId){ var t=Math.random().toString(36).slice(2,10); return Promise.resolve(location.origin+location.pathname+"?trip="+tripId+"&view="+t); },
  aiSuggest:function(prompt){
    return fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]}) })
      .then(function(r){return r.json();}).then(function(d){ return d.content.map(function(b){return b.type==="text"?b.text:"";}).join("").trim(); })
      .catch(function(){ return "Konnte gerade keinen Vorschlag laden."; });
  }
};

/* ============================================================
   TRACKMAP — GPS-Strecke mit bearbeitbaren Ankerpunkten
   - Linie verbindet die Punkte (zurückgelegte Strecke)
   - Punkt antippen: verschieben / löschen / Foto anpinnen
   - Drag: Punkt mit Finger/Maus verschieben
   - GPS-Aufzeichnung mit Intervall (aus / stündlich / täglich)
     Hinweis: Browser trackt nur, solange die App offen ist.
   - Foto-Thumbnails erscheinen am angeklickten Punkt
   ============================================================ */
function TrackMap(p){
  var s=useState([]),pts=s[0],setPts=s[1];
  var s2=useState(null),sel=s2[0],setSel=s2[1];           // ausgewählter Punkt-id
  var s3=useState("off"),interval=s3[0],setInterval2=s3[1]; // off|hour|day
  var s4=useState(""),status=s4[0],setStatus=s4[1];
  var s5=useState(false),picker=s5[0],setPicker=s5[1];     // Foto-Auswahl offen?
  var boxRef=useRef(null), dragRef=useRef(null), timerRef=useRef(null);

  useEffect(function(){
    api.fetchTrack(p.trip.id).then(setPts);
    api.fetchTrackSettings(p.trip.id).then(function(st){ setInterval2(st.interval||"off"); });
  },[p.trip.id]);
  function persist(n){ setPts(n); api.saveTrack(p.trip.id,n); }

  // --- GPS aufzeichnen
  function recordOnce(){
    if(!navigator.geolocation){ setStatus("GPS nicht verfügbar."); return; }
    setStatus("Standort wird ermittelt…");
    navigator.geolocation.getCurrentPosition(function(pos){
      // echte Koordinaten merken, Position auf Karte aus lon/lat grob mappen
      var lat=pos.coords.latitude, lon=pos.coords.longitude;
      var x=((lon+180)/360)*100; var y=(1-(lat+90)/180)*100;
      var np={ id:Date.now(), x:Math.max(4,Math.min(96,x)), y:Math.max(4,Math.min(96,y)),
               label:"Standort", time:new Date().toLocaleString("de-CH",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}),
               lat:lat, lon:lon, photo:null };
      persist(pts.concat([np])); setStatus("Punkt gespeichert ("+lat.toFixed(3)+", "+lon.toFixed(3)+").");
    }, function(){ setStatus("Standortzugriff verweigert."); }, {enableHighAccuracy:true, timeout:10000});
  }
  function changeInterval(v){
    setInterval2(v); api.saveTrackSettings(p.trip.id,{interval:v});
    if(timerRef.current){ clearInterval(timerRef.current); timerRef.current=null; }
    if(v!=="off"){
      var ms = v==="hour"?3600000:86400000;
      recordOnce();
      timerRef.current=setInterval(recordOnce, ms);
      setStatus(v==="hour"?"Aufzeichnung: stündlich (solange App offen).":"Aufzeichnung: täglich (solange App offen).");
    } else { setStatus("Aufzeichnung aus."); }
  }
  useEffect(function(){ return function(){ if(timerRef.current) clearInterval(timerRef.current); }; },[]);

  // --- Drag-Logik (Punkt verschieben)
  function pointerPos(ev){
    var box=boxRef.current.getBoundingClientRect();
    var cx = ev.touches?ev.touches[0].clientX:ev.clientX;
    var cy = ev.touches?ev.touches[0].clientY:ev.clientY;
    return { x:Math.max(2,Math.min(98,((cx-box.left)/box.width)*100)), y:Math.max(2,Math.min(98,((cy-box.top)/box.height)*100)) };
  }
  function startDrag(id,ev){ ev.preventDefault(); dragRef.current=id; setSel(id); }
  function moveDrag(ev){ if(dragRef.current==null) return; var pos=pointerPos(ev);
    setPts(function(prev){ return prev.map(function(pt){ return pt.id===dragRef.current?Object.assign({},pt,{x:pos.x,y:pos.y}):pt; }); }); }
  function endDrag(){ if(dragRef.current!=null){ dragRef.current=null; api.saveTrack(p.trip.id,pts); } }

  function delPoint(id){ persist(pts.filter(function(pt){return pt.id!==id;})); setSel(null); }
  function setPointPhoto(id, photo){
    // photo = {color, caption} oder null (zum Entfernen)
    persist(pts.map(function(pt){ return pt.id===id?Object.assign({},pt,{photo:photo?photo.color:null,photoCaption:photo?photo.caption:null}):pt; }));
    setPicker(false);
  }

  // SVG-Pfad der Strecke
  var pathD = pts.length>1 ? "M "+pts.map(function(pt){return pt.x+" "+pt.y;}).join(" L ") : "";
  var selPt = pts.filter(function(pt){return pt.id===sel;})[0];

  return h("div",{className:"space-y-4"},
    // Steuerleiste: Intervall + manueller Punkt
    h("div",{className:"card p-3 flex items-center justify-between flex-wrap gap-2"},
      h("div",{className:"flex items-center gap-2"},
        h("span",{className:"text-xs uppercase tracking-wider text-muted"},"GPS"),
        ["off","hour","day"].map(function(v){ var lbl={off:"Aus",hour:"Stündlich",day:"Täglich"}[v];
          return h("button",{key:v,onClick:function(){changeInterval(v);},className:"text-xs px-2 py-1 rounded-full",
            style:{border:"1px solid "+(interval===v?"var(--accent)":"var(--line)"),background:interval===v?"var(--accent)":"transparent",color:interval===v?"#fff":"var(--muted)"}},lbl); })),
      h("button",{onClick:recordOnce,className:"btn-primary text-xs flex items-center gap-1 px-3 py-1"}, h(Icon,{name:"crosshair"})," Jetzt erfassen")),
    status?h("p",{className:"text-xs text-signal"},status):null,

    // Karte mit Strecke + Punkten
    h("div",{className:"card card-glow overflow-hidden"},
      h("div",{ref:boxRef,className:"map-grid relative",style:{height:"20rem",touchAction:"none"},
        onMouseMove:moveDrag,onMouseUp:endDrag,onMouseLeave:endDrag,onTouchMove:moveDrag,onTouchEnd:endDrag},
        // SVG-Linie
        h("svg",{viewBox:"0 0 100 100",preserveAspectRatio:"none",style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}},
          pathD?h("path",{d:pathD,fill:"none",stroke:"var(--accent)","strokeWidth":"0.8","strokeLinejoin":"round","strokeLinecap":"round",style:{filter:"drop-shadow(var(--glow))"}}):null),
        // Punkte
        pts.map(function(pt){
          return h("div",{key:pt.id,onMouseDown:function(e){startDrag(pt.id,e);},onTouchStart:function(e){startDrag(pt.id,e);},onClick:function(){setSel(pt.id);},
            className:"absolute",style:{left:pt.x+"%",top:pt.y+"%",transform:"translate(-50%,-50%)",cursor:"grab",textAlign:"center"}},
            pt.photo
              ? h("span",{style:{display:"block",width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,"+pt.photo+","+pt.photo+"99)",border:"2px solid var(--surface)",boxShadow:"var(--glow)"}})
              : h("span",{className:"text-signal",style:{display:"block",filter:"drop-shadow(var(--glow))"}}, h(Icon,{name:sel===pt.id?"map-pin-check":"circle-dot",size:"1.4rem"})),
            h("span",{style:{fontSize:".65rem",fontWeight:600,background:"var(--surface)",padding:"0 4px",borderRadius:"3px",whiteSpace:"nowrap"}},pt.label));
        }))),
    h("p",{className:"text-xs text-muted"},"Punkt ziehen zum Verschieben · antippen für Optionen. Hintergrund-Tracking braucht später eine native App."),

    // Detail des gewählten Punkts: aktuelles Foto + Aktionen
    selPt?h("div",{className:"card p-4 fade-in"},
      h("div",{className:"flex items-center justify-between"},
        h("div",null, h("p",{className:"font-medium"},selPt.label), h("p",{className:"text-xs text-muted"},selPt.time||"")),
        h("div",{className:"flex items-center gap-3"},
          h("button",{className:"text-accent",title:"Foto anpinnen",onClick:function(){setPicker(true);}}, h(Icon,{name:"image-plus"})),
          h("button",{className:"text-signal",title:"Punkt löschen",onClick:function(){delPoint(selPt.id);}}, h(Icon,{name:"trash-2"})),
          h("button",{className:"text-muted",onClick:function(){setSel(null);}}, h(Icon,{name:"x"})))),
      // aktuell angepinntes Foto (falls vorhanden)
      selPt.photo?h("div",{className:"flex items-center gap-3 mt-3"},
        h("div",{style:{width:56,height:56,borderRadius:8,background:"linear-gradient(135deg,"+selPt.photo+","+selPt.photo+"99)",boxShadow:"var(--glow)"}}),
        h("div",null, h("p",{className:"text-sm"},selPt.photoCaption||"Angepinntes Foto"),
          h("button",{className:"text-xs text-signal",onClick:function(){setPointPhoto(selPt.id,null);}},"Entfernen"))
      ):h("p",{className:"text-xs text-muted mt-3"},"Kein Foto angepinnt. Tippe auf das Bild-Symbol oben, um eins zu wählen.")
    ):null,

    // Foto-Auswahl-Popup
    h(Modal,{open:picker,onClose:function(){setPicker(false);},title:"Foto anpinnen"},
      (p.photos||[]).length===0
        ? h("p",{className:"text-sm text-muted"},"Noch keine Fotos für diese Reise. Lade welche in der Galerie hoch.")
        : h("div",{className:"grid grid-cols-3 gap-3"},
            (p.photos||[]).map(function(ph){
              return h("button",{key:ph.id,onClick:function(){setPointPhoto(selPt.id,{color:ph.color,caption:ph.caption});},className:"text-left"},
                h("div",{className:"aspect-square rounded-lg flex items-end p-2",style:{background:"linear-gradient(135deg,"+ph.color+","+ph.color+"99)",boxShadow:"var(--glow)"}},
                  h("span",{className:"text-white",style:{fontSize:"10px",fontWeight:600}},ph.caption)));
            })))
  );
}
