/* ============================================================
   [0] ICON-HELFER
   Kleine Wrapper-Komponente für Lucide-Icons.
   ============================================================ */
function Icon({ name, className="", size }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      ref.current.appendChild(el);
      if (window.lucide) window.lucide.createIcons({ icons: window.lucide.icons, attrs:{} });
    }
  }, [name]);
  const style = size ? { width:size, height:size } : {};
  return <span ref={ref} className={"inline-flex items-center justify-center "+className} style={style}></span>;
}

/* ============================================================
   [1] DATA / API LAYER  ← HIER kommt später Supabase rein
   ------------------------------------------------------------
   Alles, was mit "Daten holen / speichern / Login" zu tun hat,
   läuft NUR über dieses "api"-Objekt. Wenn dein Supabase-Projekt
   bereit ist, ersetzt du den Inhalt der Funktionen durch echte
   Supabase-Aufrufe — der Rest der App muss NICHT angefasst werden.

   SCHRITT FÜR SUPABASE (später):
   1) SUPABASE_URL und SUPABASE_ANON_KEY unten eintragen.
   2) In den Funktionen die "DUMMY"-Blöcke durch die
      auskommentierten "SUPABASE"-Zeilen ersetzen.
   ============================================================ */

const SUPABASE_URL = "";        // ← z.B. "https://xxxx.supabase.co"
const SUPABASE_ANON_KEY = "";   // ← dein anon/public key

let supabase = null;
if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// localStorage-Helfer (Übergangsspeicher bis Supabase scharf ist)
const store = {
  get:(k,fallback)=>{ try{ const v=localStorage.getItem("tabi_"+k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } },
  set:(k,v)=>{ try{ localStorage.setItem("tabi_"+k, JSON.stringify(v)); }catch(e){} },
};

const api = {
  /* ---------- AUTH ---------- */
  async login(email, password){
    // SUPABASE:
    // const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    // if (error) throw error; return data.user;

    // DUMMY: jeder nicht-leere Login klappt
    if(!email || !password) throw new Error("Bitte E-Mail und Passwort eingeben.");
    const user = { email, name: email.split("@")[0] };
    store.set("session", user);
    return user;
  },
  async logout(){
    // SUPABASE: await supabase.auth.signOut();
    store.set("session", null);
  },
  async getSession(){
    // SUPABASE:
    // const { data } = await supabase.auth.getSession();
    // return data.session?.user ?? null;
    return store.get("session", null);
  },

  /* ---------- DATEN (Realtime-fähig vorbereitet) ----------
     Da min. 2 Personen befüllen, kommt später Realtime hierhin:
     supabase.channel('trip').on('postgres_changes', …).subscribe()
  */
  async fetchTrip(){ return store.get("trip", SEED.trip); },
  async fetchRestaurants(){ return store.get("restaurants", SEED.restaurants); },
  async saveRestaurants(list){ store.set("restaurants", list); /* SUPABASE: upsert */ },
  async fetchSpots(){ return store.get("spots", SEED.spots); },
  async saveSpots(list){ store.set("spots", list); },
  async fetchStays(){ return store.get("stays", SEED.stays); },
  async saveStays(list){ store.set("stays", list); },
  async fetchPacking(){ return store.get("packing", SEED.packing); },
  async savePacking(list){ store.set("packing", list); },
  async fetchPhotos(){ return store.get("photos", SEED.photos); },
  async savePhotos(list){ store.set("photos", list); },

  /* ---------- PLATZHALTER: brauchen zwingend Backend ---------- */
  async uploadVoiceNote(blob){
    // SUPABASE STORAGE:
    // const path = `voice/${Date.now()}.webm`;
    // const { data, error } = await supabase.storage.from('media').upload(path, blob);
    // return supabase.storage.from('media').getPublicUrl(path).data.publicUrl;
    return Promise.resolve("local-only://voice-note"); // lokal nur als Hinweis
  },
  async createShareLink(){
    // SUPABASE: erzeugt einen read-only Token/Eintrag für Beobachter.
    // Hier nur ein simulierter Link.
    const token = Math.random().toString(36).slice(2,10);
    return `${location.origin}${location.pathname}?view=${token}`;
  },

  /* ---------- "Automatische Ergänzungen" via Claude-API ----------
     Generiert z.B. einen kurzen Insider-Hinweis zu einem Ort.
     Läuft live (kein Key nötig in dieser Umgebung). */
  async aiSuggest(prompt){
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1000,
          messages:[{ role:"user", content: prompt }]
        })
      });
      const data = await res.json();
      return data.content.map(b=>b.type==="text"?b.text:"").join("").trim();
    }catch(e){ return "Konnte gerade keinen Vorschlag laden."; }
  }
};

/* ============================================================
   [4] AUTH — LOGIN-SCREEN
   ============================================================ */
function LoginScreen({ onLogin }){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  async function submit(){
    setErr(""); setBusy(true);
    try{ const u = await api.login(email,pw); onLogin(u); }
    catch(e){ setErr(e.message); }
    finally{ setBusy(false); }
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="w-full max-w-sm fade-in">
        <div className="text-center mb-10">
          <div className="font-display text-6xl tracking-tight">旅</div>
          <h1 className="font-display text-4xl mt-2">Tabi</h1>
          <p className="text-[var(--muted)] text-sm mt-1">Euer Reiseplaner für Japan</p>
        </div>
        <div className="space-y-3">
          <input className={inputCls} type="email" placeholder="E-Mail" value={email}
                 onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />
          <input className={inputCls} type="password" placeholder="Passwort" value={pw}
                 onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />
          {err && <p className="text-[var(--vermilion)] text-sm">{err}</p>}
          <button onClick={submit} disabled={busy}
                  className="w-full py-3 bg-[var(--ai)] text-white rounded-lg font-medium hover:opacity-90 transition disabled:opacity-50">
            {busy ? "Anmelden…" : "Anmelden"}
          </button>
        </div>
        <p className="text-center text-xs text-[var(--muted)] mt-6">
          Geschützter Bereich · später über Supabase abgesichert
        </p>
      </div>
    </div>
  );
}

/* ============================================================
   [5] COUNTDOWN
   ============================================================ */
function Countdown({ target }){
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(t); },[]);
  const diff = Math.max(0, new Date(target).getTime()-now);
  const d=Math.floor(diff/86400000), h=Math.floor(diff/3600000)%24, m=Math.floor(diff/60000)%60, s=Math.floor(diff/1000)%60;
  const Unit=({v,l})=>(
    <div className="text-center">
      <div className="font-mono text-3xl sm:text-4xl tabular-nums">{String(v).padStart(2,"0")}</div>
      <div className="text-[10px] uppercase tracking-widest text-[var(--muted)] mt-1">{l}</div>
    </div>
  );
  return (
    <div className="flex gap-4 sm:gap-8 justify-center">
      <Unit v={d} l="Tage"/><Unit v={h} l="Std"/><Unit v={m} l="Min"/><Unit v={s} l="Sek"/>
    </div>
  );
}

// --- Timeline ---
function Timeline({ trip }){
  const [open,setOpen]=useState(trip.days[0]?.day);
  return (
    <div className="fade-in space-y-3">
      <h2 className="font-display text-3xl mb-2">Route</h2>
      {trip.days.map(d=>(
        <div key={d.day} className="rounded-xl border border-[var(--line)] bg-white overflow-hidden">
          <button onClick={()=>setOpen(open===d.day?null:d.day)}
                  className="w-full flex items-center justify-between px-5 py-4 text-left">
            <span className="flex items-center gap-4">
              <span className="font-mono text-xs text-[var(--muted)] w-12">Tag {d.day}</span>
              <span className="font-medium">{d.city}</span>

            </span>
            <Icon name={open===d.day?"chevron-up":"chevron-down"} className="text-[var(--muted)]"/>

// --- Galerie (Fotos + Kommentare + Sprachnotiz-Platzhalter) ---
function Gallery({ user }){
  const [photos,setPhotos]=useState([]);
  const [active,setActive]=useState(null);
  const [text,setText]=useState("");
  const [recording,setRecording]=useState(false);

  useEffect(()=>{ api.fetchPhotos().then(setPhotos); },[]);
  function persist(next){ setPhotos(next); api.savePhotos(next); }

  function addComment(){
    if(!text || active==null) return;
    const next = photos.map(p=>p.id===active ? {...p, comments:[...p.comments,{by:user.name,text}]} : p);
    persist(next); setText("");
  }
  // Sprachaufnahme: nimmt im Browser auf; Speichern braucht später Supabase Storage
  async function toggleVoice(){
    if(recording){ setRecording(false); return; }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const rec = new MediaRecorder(stream); const chunks=[];
      rec.ondataavailable=e=>chunks.push(e.data);
      rec.onstop=async()=>{ const blob=new Blob(chunks); await api.uploadVoiceNote(blob); stream.getTracks().forEach(t=>t.stop()); };
      rec.start(); setRecording(true);
      setTimeout(()=>{ if(rec.state!=="inactive"){ rec.stop(); setRecording(false); } },5000);
    }catch(e){ alert("Mikrofonzugriff nicht möglich (im Browser auf GitHub Pages aktivierbar)."); }
  }

  const activePhoto = photos.find(p=>p.id===active);

  return (
    <div className="fade-in">
      <h2 className="font-display text-3xl mb-3">Galerie</h2>
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
        {photos.map(p=>(
          <button key={p.id} onClick={()=>setActive(p.id)} className="text-left group">
            <div className="aspect-square rounded-xl flex items-end p-3" style={{background:`linear-gradient(135deg, ${p.color}, ${p.color}cc)`}}>
              <span className="text-white text-sm font-medium drop-shadow">{p.caption}</span>
            </div>
            <p className="text-xs text-[var(--muted)] mt-1 flex items-center gap-1"><Icon name="message-circle"/> {p.comments.length} · {p.city}</p>
          </button>
        ))}
      </div>

      <Modal open={active!=null} onClose={()=>setActive(null)} title={activePhoto?.caption||""}>
        {activePhoto && (
          <div>
            <div className="aspect-video rounded-xl mb-4" style={{background:`linear-gradient(135deg, ${activePhoto.color}, ${activePhoto.color}cc)`}}></div>
            <p className="text-xs uppercase tracking-wider text-[var(--muted)] mb-2">Kommentare</p>
            <div className="space-y-2 mb-4 max-h-40 overflow-y-auto">
              {activePhoto.comments.length===0 && <p className="text-sm text-[var(--muted)]">Noch keine Kommentare.</p>}
              {activePhoto.comments.map((c,i)=>(
                <div key={i} className="text-sm"><span className="font-medium">{c.by}:</span> <span className="text-[var(--muted)]">{c.text}</span></div>
              ))}
            </div>
            <div className="flex gap-2">
              <input className={inputCls} placeholder="Kommentar schreiben…" value={text}
                     onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addComment()}/>
              <button onClick={toggleVoice} title="Sprachnotiz (5 Sek.)"
                      className={`px-3 rounded-lg border ${recording?"bg-[var(--vermilion)] text-white border-[var(--vermilion)]":"border-[var(--line)] text-[var(--ai)]"}`}>
                <Icon name={recording?"square":"mic"}/>
              </button>
              <button onClick={addComment} className="px-3 bg-[var(--ai)] text-white rounded-lg"><Icon name="send"/></button>
            </div>
            <p className="text-[10px] text-[var(--muted)] mt-2">Sprachnotizen werden gespeichert, sobald Supabase Storage verbunden ist.</p>
          </div>
        )}
      </Modal>
    </div>
  );
}

// --- Packliste ---
function Packing(){
  const [list,setList]=useState([]);
  const [text,setText]=useState("");
  useEffect(()=>{ api.fetchPacking().then(setList); },[]);
  function persist(next){ setList(next); api.savePacking(next); }
  function toggle(id){ persist(list.map(i=>i.id===id?{...i,done:!i.done}:i)); }
  function add(){ if(!text)return; persist([...list,{id:Date.now(),label:text,done:false}]); setText(""); }
  function remove(id){ persist(list.filter(i=>i.id!==id)); }
  const doneCount=list.filter(i=>i.done).length;

  return (
    <div className="fade-in">
      <div className="flex items-baseline justify-between mb-3">
        <h2 className="font-display text-3xl">Packliste</h2>
        <span className="text-sm text-[var(--muted)] font-mono">{doneCount}/{list.length}</span>
      </div>
      <div className="flex gap-2 mb-4">
        <input className={inputCls} placeholder="Etwas hinzufügen…" value={text}
               onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button onClick={add} className="px-3 bg-[var(--ai)] text-white rounded-lg"><Icon name="plus"/></button>
      </div>
      <div className="space-y-2">
        {list.map(i=>(
          <div key={i.id} className="flex items-center gap-3 rounded-lg border border-[var(--line)] bg-white px-4 py-2.5 group">
            <button onClick={()=>toggle(i.id)} className={`w-5 h-5 rounded border flex items-center justify-center ${i.done?"bg-[var(--ai)] border-[var(--ai)] text-white":"border-[var(--line)]"}`}>
              {i.done && <Icon name="check" size="0.8rem"/>}
            </button>
            <span className={`flex-1 text-sm ${i.done?"line-through text-[var(--muted)]":""}`}>{i.label}</span>
            <button onClick={()=>remove(i.id)} className="text-[var(--muted)] opacity-0 group-hover:opacity-100"><Icon name="trash-2" size="1rem"/></button>
          </div>
        ))}
      </div>
    </div>
  );
}

        <div className="flex justify-around py-2" style={{paddingBottom:"max(0.5rem, env(safe-area-inset-bottom))"}}>
          {TABS.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)}
              className={`flex flex-col items-center gap-0.5 px-2 ${tab===t.key?"text-[var(--ai)]":"text-[var(--muted)]"}`}>
              <Icon name={t.icon} size="1.2rem"/>
              <span className="text-[10px]">{t.label}</span>
            </button>
          ))}
        </div>
      </nav>

      {/* Teilen-Modal */}
      <Modal open={!!shareLink} onClose={()=>setShareLink(null)} title="Reise teilen">
        <p className="text-sm text-[var(--muted)] mb-3">Freunde können mit diesem Link mitlesen (read-only). Aktiv, sobald Supabase verbunden ist.</p>
        <div className="flex gap-2">
          <input className={inputCls} readOnly value={shareLink||""}/>
          <button onClick={()=>{navigator.clipboard?.writeText(shareLink);}} className="px-3 bg-[var(--ai)] text-white rounded-lg"><Icon name="copy"/></button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
// Icons nach erstem Render initialisieren
setTimeout(()=>window.lucide && window.lucide.createIcons(), 300);
</script>
</body>
</html>
